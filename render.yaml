services:
  - type: web
    name: fiche-light-pft
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # à renseigner dans le dashboard Render → Environment
      - key: HF_TOKEN
        sync: false   # optionnel — active BRIA RMBG-2.0 (meilleure suppression de fond)
    disk:
      name: templates-storage
      mountPath: /opt/render/project/src/templates
      sizeGB: 1
